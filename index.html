
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCYI Library Inventory</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<h1>📚 CCYI Library Inventory System</h1>
<p>Manage Your Book Collection</p>
</header>

<div class="card">

<h2>Add New Book</h2>

<input type="text" id="title" placeholder="Book Title">

<input type="text" id="author" placeholder="Author">

<input type="text" id="isbn" placeholder="ISBN">

<input type="text" id="category" placeholder="Category">

<input type="number" id="quantity" placeholder="Quantity">

<button onclick="addBook()">Add Book</button>

</div>

<div class="card">

<h2>Search Books</h2>

<input
type="text"
id="search"
placeholder="Search title, author or category"
onkeyup="searchBooks()">

</div>

<div class="card">

<h2>Inventory</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Author</th>
<th>ISBN</th>
<th>Category</th>
<th>Qty</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="bookTable"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>
### Loan Book Section

<div class="card">

<h2>📖 Loan Book</h2>

<input type="text" id="borrowerName" placeholder="Borrower's Name">

<input type="text" id="borrowerPhone" placeholder="Phone Number">

<input type="text" id="borrowerEmail" placeholder="Email">

<select id="loanBookSelect"></select>

<label>Date Borrowed</label>
<input type="date" id="borrowDate">

<label>Expected Return Date</label>
<input type="date" id="dueDate">

<button onclick="loanBook()">
Loan Book
</button>

</div>

<div class="card">

<h2>📋 Loan Records</h2>

<table>

<thead>
<tr>
<th>Borrower</th>
<th>Book</th>
<th>Borrowed</th>
<th>Due Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="loanTable"></tbody>

</table>

</div>


</body>
</html>
